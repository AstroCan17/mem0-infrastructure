<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <style>
      .split-wrapper {
        display: flex;
        flex-direction: row;
        gap: 20px;
        max-width: 100%;
        margin: 0 auto;
      }
      .split-content {
        flex: 1;
        min-width: 50%;
        padding: 20px;
        border-right: 1px solid #444;
      }
      .split-diagram {
        flex: 1;
        position: sticky;
        top: 20px;
        height: calc(100vh - 40px);
        padding: 20px;
        overflow-y: auto;
      }
      @media (max-width: 1000px) {
        .split-wrapper { flex-direction: column; }
        .split-content { border-right: none; border-bottom: 1px solid #444; }
        .split-diagram { position: static; height: auto; }
      }
    </style>
  </head>
  <body>
    <div class="wrapper" style="max-width: 100%; margin: 0; padding: 20px;">
      <header style="width: 100%; max-width: 1200px; margin: 0 auto;">
        <h1><a href="{{ "/" | relative_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
        <p>{{ site.description | default: site.github.project_tagline }}</p>
      </header>

      <div class="split-wrapper">
        <div class="split-content">
          {{ content }}
        </div>
        <div class="split-diagram">
          <h3>Plan Diagram</h3>
          <div class="mermaid">
            {% include {{ page.diagram }} %}
          </div>
        </div>
      </div>

      <footer style="width: 100%; max-width: 1200px; margin: 20px auto;">
        <p><small>Hosted on GitHub Pages &mdash; Theme by <a href="https://github.com/orderedlist">orderedlist</a></small></p>
      </footer>
    </div>

    <!-- MERMAID SCRIPT -->
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ startOnLoad: true, theme: 'dark' });
    </script>
  </body>
</html>
