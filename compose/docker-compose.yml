services:
  ollama:
    build:
      context: ..
      dockerfile: services/ollama/Dockerfile
    container_name: ollama-service
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=-1
    restart: unless-stopped
    networks:
      - mem0-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-service
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__STORAGE__WRITE_AHEAD_LOG__ENABLED=true
      - QDRANT__TELEMETRY__DISABLED=true
    restart: unless-stopped
    networks:
      - mem0-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  mem0-mcp:
    build:
      context: ..
      dockerfile: services/mem0-mcp/Dockerfile
    container_name: mem0-supergateway
    ports:
      - "127.0.0.1:8766:8765"
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      MEM0_STORE_PATH: /root/.copilot/mem0
      OLLAMA_BASE_URL: http://ollama:11434
      MEM0_EMBED_MODEL: mxbai-embed-large:latest
      MEM0_OLLAMA_TIMEOUT_MS: "60000"
      MEM0_WORKSPACE: copernicus
      MEM0_PROJECT: default
      MEM0_LLM_PROVIDER: ollama
      MEM0_LLM_MODEL: qwen3:1.7b
      MEM0_LLM_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mem0_memories
    volumes:
      - mem0_data:/root/.copilot/mem0
    networks:
      - mem0-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

  plantuml:
    image: plantuml/plantuml-server:jetty
    profiles: ["tools"]
    ports:
      - "127.0.0.1:8888:8080"

volumes:
  ollama_models:
    driver: local
  mem0_data:
    driver: local
  qdrant_storage:
    driver: local

networks:
  mem0-network:
    driver: bridge
